apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: {{NAMESPACE}}
  labels:
    app: redis
    app.kubernetes.io/part-of: claude-code-hub
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      initContainers:
        - name: init-config
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              cat > /etc/redis/redis.conf << CONF
              requirepass ${REDIS_PASSWORD}
              # 为 Redis 自身开销预留余量,避免 maxmemory 打满后被容器 OOMKill。
              maxmemory 3gb
              maxmemory-policy allkeys-lru
              appendonly yes
              appendfsync everysec
              tcp-backlog 511
              tcp-keepalive 60
              timeout 0
              hz 50
              save ""
              CONF
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: claude-code-hub-secrets
                  key: redis-password
          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          command:
            - redis-server
            - /etc/redis/redis.conf
          resources:
            requests:
              cpu: 250m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - REDISCLI_AUTH="$REDIS_PASSWORD" redis-cli --no-auth-warning ping | grep -q PONG
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - REDISCLI_AUTH="$REDIS_PASSWORD" redis-cli --no-auth-warning ping | grep -q PONG
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: claude-code-hub-secrets
                  key: redis-password
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: redis-config
              mountPath: /etc/redis
      volumes:
        - name: redis-config
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{STORAGE_CLASS}}
        resources:
          requests:
            storage: {{REDIS_STORAGE_SIZE}}
